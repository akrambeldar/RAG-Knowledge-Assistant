### `docs/sample.txt` (put a placeholder so the folder exists on GitHub)
```
This is a sample document for the RAG Knowledge Assistant.

Retrieval-Augmented Generation (RAG) is a technique that combines information retrieval
with large language model generation. It retrieves relevant context from a knowledge base
and uses it to ground the LLM response, reducing hallucination.

Key components:
- Document ingestion and chunking
- Vector embeddings for semantic search
- Top-k retrieval using cosine similarity
- Grounded prompt construction
- LLM generation with retrieved context
